services:
  kafka:
    image: apache/kafka:3.8.0
    container_name: maestro-kafka
    ports:
      - "9092:9092"
      - "9094:9094"
    environment:
      - KAFKA_ENABLE_KRAFT=yes
      - KAFKA_PROCESS_ROLES=broker,controller
      - KAFKA_NODE_ID=1
      - KAFKA_CONTROLLER_QUORUM_VOTERS=1@kafka:9093
      - KAFKA_LISTENERS=LOCAL://:9092,EXTERNAL://:9094,DOCKER://:29092,CONTROLLER://:9093
      - KAFKA_ADVERTISED_LISTENERS=LOCAL://localhost:9092,EXTERNAL://${KAFKA_EXTERNAL_HOST:-localhost}:9094,DOCKER://kafka:29092
      - KAFKA_LISTENER_SECURITY_PROTOCOL_MAP=LOCAL:PLAINTEXT,EXTERNAL:PLAINTEXT,DOCKER:PLAINTEXT,CONTROLLER:PLAINTEXT
      - KAFKA_INTER_BROKER_LISTENER_NAME=LOCAL
      - KAFKA_CONTROLLER_LISTENER_NAMES=CONTROLLER
      - CLUSTER_ID=MkU3OEVBNTcwNTJENDM2Qg
      - KAFKA_AUTO_CREATE_TOPICS_ENABLE=true
      - KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR=1
      - KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR=1
      - KAFKA_TRANSACTION_STATE_LOG_MIN_ISR=1
      - KAFKA_METADATA_VERSION=3.8
      - KAFKA_NUM_NETWORK_THREADS=9
      - KAFKA_NUM_IO_THREADS=18
      - KAFKA_BACKGROUND_THREADS=10
      - KAFKA_LOG_SEGMENT_BYTES=1073741824
      - KAFKA_LOG_RETENTION_CHECK_INTERVAL_MS=300000
      - KAFKA_SOCKET_SEND_BUFFER_BYTES=102400
      - KAFKA_SOCKET_RECEIVE_BUFFER_BYTES=102400
      - KAFKA_SOCKET_REQUEST_MAX_BYTES=104857600
      - KAFKA_METADATA_MAX_IDLE_INTERVAL_MS=500
      - KAFKA_CONTROLLER_QUORUM_FETCH_TIMEOUT_MS=2000
